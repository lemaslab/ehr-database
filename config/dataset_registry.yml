legacy_raw:
  base_dir: "V:/FACULTY/DJLEMAS/EHR_Data_raw/raw/READ_ONLY_DATASETS/10year_data"

output:
  base_dir: "data/processed"

sites:
  GNV:
    code: "GNV"
    legacy_suffix: ""
  JAX:
    code: "JAX"
    legacy_suffix: "_jax"

selection:
  strategy: "configured"
  fallback_strategy: "latest"

datasets:
  mom_baby_link:
    components:
      linkage:
        GNV:
          preferred:
            year: "2021"
            dataset_version: "dataset_09_2021"
            folder: ""
          filename_patterns:
            - "^baby_mom_link\\.csv$"
        JAX:
          preferred:
            year: "2025"
            dataset_version: "dataset_04_2025"
            folder: ""
          filename_patterns:
            - "^baby_mom_link_[Jj]ax\\.csv$"
        schema_map:
          part_id_mom_tmp:
            - "Deidentified_mom_ID"
            - "deidentified_mom_id"
          part_id_infant_tmp:
            - "Deidentified_baby_ID"
            - "deidentified_baby_id"
      birth:
        GNV:
          preferred:
            year: "2021"
            dataset_version: "dataset_09_2021"
            folder: ""
          filename_patterns:
            - "^baby_mom_at_birth_with_payer\\.csv$"
        JAX:
          preferred:
            year: "2025"
            dataset_version: "dataset_04_2025"
            folder: ""
          filename_patterns:
            - "^baby_mom_at_birth_with_payer_[Jj]ax\\.csv$"
            - "^baby_mom_at_birth_[Ww]ith_[Pp]ayer_[Jj]ax\\.csv$"
        schema_map:
          part_id_infant_tmp:
            - "Deidentified_baby_ID"
            - "deidentified_baby_id"
          part_dob_infant_raw:
            - "Deid-Delivery Datetime"
            - "date_of_delivery"
